image_size: [1088, 1920]
# Dataset options:
# - coco
# - coco128
# - visdrone128
# - visdrone
data_yaml_path: "data/visdrone128.yaml"
dataset_autodownload: False
# `dataset_path` can be a single root or an ordered list of candidate roots.
# The integration uses the first root that contains the configured split data.
dataset_path:
  - "~/tensorleap/data/rheinmetall-mock"
  - "~/tensorleap/data/visdrone128"
  - "C:\\data\\visdrone128"
  - "/Users/orram/Tensorleap/data/visdrone128"
torch_model_weights_name: "new_best.pt"

max_num_of_objects: 500
model_path: "client_format_structure.onnx"
model_type: "RTDETR"
# Supported model output contracts:
# - rtdetr_raw: labels, boxes, scores, pred_logits, pred_boxes
# - detections: labels, boxes, scores
# - detections_concat_scores: labels, boxes where the last channel is score
# - class_scores: boxes, scores[N,C], logits[N,C] — no labels output, no orig_target_sizes input
model_output_format: "class_scores"
# Set to true if the model outputs boxes in cxcywh format (raw RT-DETR models).
# Set to false if the model already outputs xyxy (e.g. client_format_structure.onnx).
boxes_in_cxcywh_format: false
output_indices:
  boxes: 0
  scores: 1
  logits: 2

loss:
  map_coco_category_to_label: false
  weight_dict:
    loss_vfl: 1.0
    loss_bbox: 5.0
    loss_giou: 2.0
  alpha: 0.75
  gamma: 2.0
  matcher:
    cost_class: 2.0
    cost_bbox: 5.0
    cost_giou: 2.0
    alpha: 0.25
    gamma: 2.0

annotation_file:
  train: "annotations_train.json"
  val: "annotations_val.json"
  test: "annotations_test.json"

s3:
  enabled: false
  bucket_name: ""
  prefix: ""

score_threshold: 0.3
max_detections: 300
plot_visualizers: true
check_subset_index: 0
check_sample_index: 0
dataset_download_url: "https://github.com/ultralytics/yolov5/releases/download/v1.0/coco128.zip"
dataset_extract_dir: "data"

