image_size: [1088, 1920]

# Optional: path to a YAML file with a `names` or `pred_names` list for label display.
# If omitted or file not found, label names are read from the COCO annotation categories.
# data_yaml_path: "data/visdrone128.yaml"

dataset_path: "/Users/ranhomri/tensorleap/data/rheinmetall-s3-test"

max_num_of_objects: 500
model_path: "client_format_structure.onnx"

annotation_file:
  train: "train/annotations_train.json"
  val: "val/annotations_val.json"

s3:
  enabled: true
  bucket_name: "tensorleap-ran-dev"
  prefix: "rheinmetall-test"

score_threshold: 0.3
max_detections: 300

# GT annotation bbox format in the COCO JSON.
# Coordinate type: "xywh" (top-left + size), "xyxy" (two corners), "cxcywh" (center + size)
# Scale suffix:    "_abs" (absolute pixels),  "_norm" (normalized 0-1)
# Valid values: "xywh_abs", "xywh_norm", "xyxy_abs", "xyxy_norm", "cxcywh_abs", "cxcywh_norm"
gt_bbox_format: "xywh_abs"

# Model output bbox format for the boxes tensor.
# Valid values: "xyxy_abs", "xyxy_norm", "cxcywh_abs", "cxcywh_norm"
pred_bbox_format: "xyxy_abs"

loss:
  weight_dict:
    loss_vfl: 1.0
    loss_bbox: 5.0
    loss_giou: 2.0
  alpha: 0.75
  gamma: 2.0
  matcher:
    cost_class: 2.0
    cost_bbox: 5.0
    cost_giou: 2.0
    alpha: 0.25
    gamma: 2.0

plot_visualizers: false
check_subset_index: 0
check_sample_index: 0
